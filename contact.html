<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    .container{
        display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    .header{
width: 97%;
    }
    .header__right-one-mobile{
        color: #fff !important;
    display: flex;
    background: #7a6e6e !important;
}
    }
</style>

<body class="bg-gray-100 min-h-screen">
    <div class="container">
<div class="header">
            <div class="header__title">TechZone</div>
            <div class="header__right">
                <div class="header__right-one">
                    <p><a href="index.html">Home</a></p>
                    <p><a href="shop.html">Shop</a></p>
                    <p><a href="deals.html">Deals</a></p>
                    <p>About</p>
                    <p><a href="contact.html">Contact</a></p>
                </div>
                <div class="header__right-two">
                    <span class="addCartParSpan">
                        <i class="fa-solid fa-cart-shopping"></i>
                        <p class="addCartPar">Cart</p>
                    </span>
                    <span>

                        <p>Login</p>
                    </span>
                </div>
            </div>
            <div class="header__right-navBar">
                <i class="fa-solid fa-bars navBar"></i>
            </div>
                <div class="header__right-one-mobile">
                    <span class="icon-close">X</span>
                    <p>Home</p>
                    <p>Shop</p>
                    <p>Deals</p>
                    <p>About</p>
                    <p>Contact</p>
                </div>
        </div>
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">
            Contact Us
        </h2>

        <form>


            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Name</label>
                <input type="text" placeholder="Enter your name"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>


            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" placeholder="Enter your email"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>


            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Message</label>
                <textarea rows="4" placeholder="Enter your message"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
            </div>


            <button type="submit"
                class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition duration-300">
                Send Message
            </button>

        </form>

    </div>
</div>
</body>
<script src="script.js"></script>
</html>
